# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m

# Enable parallel execution to speed up builds
org.gradle.parallel=true

# Enable build cache
#android.enableBuildCache=true

# AndroidX package structure
android.useAndroidX=true

# Architectures to build
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# Enable new architecture (TurboModules / Fabric)
newArchEnabled=true

# Enable Hermes JS engine
hermesEnabled=true

# Edge-to-edge display support
edgeToEdgeEnabled=false

# Signing configuration for release build
MYAPP_RELEASE_STORE_FILE=app-release.keystore
MYAPP_RELEASE_KEY_ALIAS=app-key
MYAPP_RELEASE_STORE_PASSWORD=shahzadapp
MYAPP_RELEASE_KEY_PASSWORD=shahzadapp
